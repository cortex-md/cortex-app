name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please focus on the user workflow or developer problem.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow, limitation, or user need should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Cortex to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or different approaches did you consider?
  - type: dropdown
    id: contribution
    attributes:
      label: Contribution interest
      options:
        - I can help implement this
        - I can help test this
        - I am only suggesting the idea
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, examples, links, or constraints.
