name: React Doctor

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/react-doctor.yml"
      - "apps/desktop/**"
      - "packages/editor/**"
      - "packages/plugin-host-web/**"
      - "packages/ui/**"
      - "package.json"
      - "bun.lock"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/react-doctor.yml"
      - "apps/desktop/**"
      - "packages/editor/**"
      - "packages/plugin-host-web/**"
      - "packages/ui/**"
      - "package.json"
      - "bun.lock"

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    name: Desktop — React Doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: React Doctor
        run: bun run doctor:desktop
