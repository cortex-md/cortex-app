name: Publish API

on:
  push:
    branches:
      - "main"
    tags:
      - "api-v*"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (defaults to packages/plugin-api/package.json)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish @cortex.md/api
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install

      - name: Resolve version
        id: version
        shell: bash
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ "$INPUT_VERSION" != "" ]; then
            VERSION="$INPUT_VERSION"
          elif [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#api-v}"
          else
            VERSION="$(node -p "require('./packages/plugin-api/package.json').version")"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION"
            echo "Use a semver version such as 0.1.4 or 0.2.0-beta.1"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved @cortex.md/api version: $VERSION"

      - name: Update version in package.json
        if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag'
        working-directory: packages/plugin-api
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Verify package version
        working-directory: packages/plugin-api
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "package.json version $PACKAGE_VERSION does not match resolved version $VERSION"
            exit 1
          fi

      - name: Build package
        working-directory: packages/plugin-api
        run: bun run build

      - name: Verify dist exists
        working-directory: packages/plugin-api
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not found after build"
            exit 1
          fi
          ls -la dist/

      - name: Verify package contents
        working-directory: packages/plugin-api
        run: npm pack --dry-run

      - name: Check npm version
        if: github.event_name != 'pull_request'
        id: npm_version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "@cortex.md/api@$VERSION" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate npm publish token
        if: github.event_name != 'pull_request' && steps.npm_version.outputs.exists == 'false'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Missing required secret: NPM_TOKEN"
            exit 1
          fi

      - name: Publish to npm
        if: github.event_name != 'pull_request' && steps.npm_version.outputs.exists == 'false'
        working-directory: packages/plugin-api
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip existing npm version
        if: github.event_name != 'pull_request' && steps.npm_version.outputs.exists == 'true'
        run: echo "@cortex.md/api@${{ steps.version.outputs.version }} already exists on npm; skipping publish."

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && steps.npm_version.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: API v${{ steps.version.outputs.version }}
          body: |
            ## @cortex.md/api v${{ steps.version.outputs.version }}

            Plugin API package for Cortex plugin developers.

            ### Installation

            ```bash
            npm install @cortex.md/api@${{ steps.version.outputs.version }}
            ```

            Or with bun:

            ```bash
            bun add @cortex.md/api@${{ steps.version.outputs.version }}
            ```

            ### Documentation

            See the [Plugin API documentation](https://github.com/cortex-md/cortex-app/tree/main/packages/plugin-api) for usage details.

            ### What's New

            Check the [CHANGELOG](https://github.com/cortex-md/cortex-app/blob/main/packages/plugin-api/CHANGELOG.md) for detailed changes.
          draft: false
          prerelease: false
