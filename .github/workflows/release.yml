name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  release-metadata:
    name: Release metadata
    runs-on: ubuntu-22.04
    outputs:
      tag_name: ${{ steps.version.outputs.tag_name }}
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        env:
          RELEASE_VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          node scripts/release/resolve-desktop-release-metadata.mjs

  wait-for-ci:
    name: Wait for CI
    needs: release-metadata
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Wait for CI workflow to pass
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-metadata.outputs.tag_name }}
        run: |
          node scripts/release/wait-for-ci-workflow.mjs

  build-tauri:
    name: Build ${{ matrix.name }}
    needs:
      - release-metadata
      - wait-for-ci
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            artifact_name: cortex-macos-apple-silicon
            platform: macos-15
            os: macos
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg --config src-tauri/tauri.release.conf.json
            artifact_paths: |
              apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg
              apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.app.tar.gz
              apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.app.tar.gz.sig
          - name: Windows
            artifact_name: cortex-windows
            platform: windows-latest
            os: windows
            rust_target: ""
            args: --bundles msi --config src-tauri/tauri.release.conf.json
            artifact_paths: |
              apps/desktop/src-tauri/target/release/bundle/**/*.msi
              apps/desktop/src-tauri/target/release/bundle/**/*.msi.sig
          - name: Ubuntu
            artifact_name: cortex-ubuntu
            platform: ubuntu-22.04
            os: linux
            rust_target: ""
            args: --bundles deb,appimage --config src-tauri/tauri.release.conf.json
            artifact_paths: |
              apps/desktop/src-tauri/target/release/bundle/**/*.deb
              apps/desktop/src-tauri/target/release/bundle/**/*.AppImage
              apps/desktop/src-tauri/target/release/bundle/**/*.AppImage.sig

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        if: matrix.os == 'linux'
        shell: bash
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune -af || true
          sudo apt-get clean
          df -h

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rust_target != ''
        shell: bash
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          cache-on-failure: true

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            wget

      - name: Fetch Rust dependencies
        shell: bash
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          fetch_args=(--locked --manifest-path apps/desktop/src-tauri/Cargo.toml)

          if [ -n "$RUST_TARGET" ]; then
            fetch_args+=(--target "$RUST_TARGET")
          fi

          for attempt in 1 2 3; do
            if cargo fetch "${fetch_args[@]}"; then
              exit 0
            fi

            if [ "$attempt" = "3" ]; then
              exit 1
            fi

            sleep $((attempt * 15))
          done

      - name: Install frontend dependencies
        run: bun install

      - name: Apply release version
        env:
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          node scripts/release/apply-desktop-release-version.mjs

      - name: Validate sync release config
        env:
          CORTEX_SYNC_SERVER_URL: ${{ vars.CORTEX_SYNC_SERVER_URL }}
          CORTEX_BILLING_URL: ${{ vars.CORTEX_BILLING_URL }}
        run: |
          node scripts/release/validate-desktop-sync-config.mjs

      - name: Prepare Tauri release config
        env:
          CORTEX_UPDATER_PUBLIC_KEY: ${{ vars.CORTEX_UPDATER_PUBLIC_KEY }}
        run: |
          node scripts/release/prepare-tauri-release-config.mjs

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          CORTEX_SYNC_SERVER_URL: ${{ vars.CORTEX_SYNC_SERVER_URL }}
          CORTEX_BILLING_URL: ${{ vars.CORTEX_BILLING_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    needs:
      - release-metadata
      - build-tauri
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        run: |
          node scripts/release/prepare-desktop-release-assets.mjs

      - name: Generate release body
        env:
          RELEASE_TAG: ${{ needs.release-metadata.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          node scripts/release/generate-desktop-release-body.mjs

      - name: Generate updater manifest
        env:
          RELEASE_TAG: ${{ needs.release-metadata.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.release-metadata.outputs.version }}
        run: |
          node scripts/release/generate-desktop-updater-manifest.mjs

      - name: Generate stable download aliases
        run: |
          node scripts/release/generate-desktop-download-aliases.mjs

      - name: Generate checksums
        run: |
          node scripts/release/generate-desktop-release-checksums.mjs

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-metadata.outputs.tag_name }}
          name: Cortex v${{ needs.release-metadata.outputs.version }}
          body_path: release-body.md
          files: dist/release/*
          draft: false
          prerelease: ${{ needs.release-metadata.outputs.is_prerelease }}
          fail_on_unmatched_files: true
          overwrite_files: true
