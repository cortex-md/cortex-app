name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/ci.yml'
      - 'AGENTS.md'
      - 'apps/desktop/**'
      - 'packages/commands/**'
      - 'packages/core/**'
      - 'packages/editor/**'
      - 'packages/hotkeys/**'
      - 'packages/ipc/**'
      - 'packages/marketplace/**'
      - 'packages/platform/**'
      - 'packages/plugin-api/**'
      - 'packages/plugin-host-core/**'
      - 'packages/plugin-host-web/**'
      - 'packages/properties/**'
      - 'packages/renderer/**'
      - 'packages/search/**'
      - 'packages/settings/**'
      - 'packages/templates/**'
      - 'packages/theme/**'
      - 'packages/ui/**'
      - 'plugins/github-emoji/**'
      - 'scripts/*.mjs'
      - 'tools/benchmarks/**'
      - 'biome.json'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig.desktop.json'
      - 'tsconfig.json'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/ci.yml'
      - 'AGENTS.md'
      - 'apps/desktop/**'
      - 'packages/commands/**'
      - 'packages/core/**'
      - 'packages/editor/**'
      - 'packages/hotkeys/**'
      - 'packages/ipc/**'
      - 'packages/marketplace/**'
      - 'packages/platform/**'
      - 'packages/plugin-api/**'
      - 'packages/plugin-host-core/**'
      - 'packages/plugin-host-web/**'
      - 'packages/properties/**'
      - 'packages/renderer/**'
      - 'packages/search/**'
      - 'packages/settings/**'
      - 'packages/templates/**'
      - 'packages/theme/**'
      - 'packages/ui/**'
      - 'plugins/github-emoji/**'
      - 'scripts/*.mjs'
      - 'tools/benchmarks/**'
      - 'biome.json'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig.desktop.json'
      - 'tsconfig.json'

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  desktop:
    name: Desktop — Biome, types, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome lint
        run: bun run lint

      - name: Biome check
        run: bun run check

      - name: TypeScript
        run: bun run typecheck

      - name: Workspace boundaries
        run: bun run check:boundaries

      - name: Vitest
        run: bun run test:desktop:frontend

  rust:
    name: Desktop — Rust fmt, check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          version: 1.0

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Fetch Rust dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if cargo fetch --locked; then
              exit 0
            fi

            if [ "$attempt" = "3" ]; then
              exit 1
            fi

            sleep $((attempt * 15))
          done

      - name: Check
        run: cargo check --workspace

      - name: Tests
        run: cargo test --workspace
